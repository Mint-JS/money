<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주가 예측 시뮬레이션</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #container { width: 800px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #news-box { margin-top: 20px; padding: 15px; background: #eef2f3; border-left: 5px solid #0056b3; border-radius: 5px; }
        .controls { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .btn-up { background-color: #ff4d4d; color: white; }
        .btn-down { background-color: #4d94ff; color: white; }
        .btn-next { background-color: #333; color: white; width: 100%; margin-top: 10px; }
        button:hover { opacity: 0.8; }
        #feedback { margin-top: 15px; font-weight: bold; text-align: center; font-size: 18px; color: #333; }
    </style>
</head>
<body>

<div id="container">
    <h2 style="text-align: center;">📊 다음 날의 주가를 예측해 보세요!</h2>
    <canvas id="stockChart"></canvas>

    <div id="news-box">
        <h3 id="current-date">날짜: </h3>
        <p><strong>📰 오늘의 주요 뉴스:</strong> <span id="current-news"></span></p>
    </div>

    <div id="prediction-section">
        <p style="text-align: center; margin-bottom: 5px;">뉴스를 보고 내일 주가가 오를지 내릴지 예측해 보세요.</p>
        <div class="controls">
            <button class="btn-up" onclick="makePrediction('상승')">📈 오를 것이다!</button>
            <button class="btn-down" onclick="makePrediction('하락')">📉 내릴 것이다!</button>
        </div>
    </div>

    <div id="feedback"></div>
    
    <button class="btn-next" id="next-btn" onclick="nextDay()" style="display: none;">다음 날 결과 확인하기</button>
</div>

<script>
    // 1. 교육용 시나리오 데이터 (날짜, 주가, 당일 발표된 뉴스/사건)
    const stockData = [
        { date: '2020-01-20', price: 62400, news: '국내 첫 코로나19 확진자 발생. 하지만 시장은 아직 잠잠하다.' },
        { date: '2020-02-18', price: 59800, news: '대구 지역 대규모 감염 사태 시작. 불안감이 커지고 있다.' },
        { date: '2020-03-19', price: 42950, news: '전 세계적 팬데믹 선언. 코스피 1500선 붕괴, 외국인 대규모 매도.' },
        { date: '2020-03-24', price: 46950, news: '한국은행, 사상 첫 무제한 돈풀기(양적완화) 선언. 미국도 부양책 발표.' },
        { date: '2020-04-17', price: 51400, news: '개인 투자자들의 대규모 매수세(동학개미운동) 지속. 확진자 증가세 둔화.' },
        { date: '2020-06-04', price: 54600, news: '반도체 수출 회복 조짐 및 경제 재개 기대감 상승.' }
    ];

    let currentIndex = 0;
    let userPrediction = "";
    
    const ctx = document.getElementById('stockChart').getContext('2d');
    let chart;

    // 2. 차트 초기화 함수
    function initChart() {
        const initialDates = [stockData[0].date];
        const initialPrices = [stockData[0].price];

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: initialDates,
                datasets: [{
                    label: '삼성전자 주가 (원)',
                    data: initialPrices,
                    borderColor: '#0056b3',
                    backgroundColor: 'rgba(0, 86, 179, 0.1)',
                    borderWidth: 3,
                    pointRadius: 6,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { min: 40000, max: 70000 } // 주가 변동폭에 맞게 조정
                }
            }
        });
        updateUI();
    }

    // 3. 화면 UI 업데이트 (날짜, 뉴스 변경)
    function updateUI() {
        document.getElementById('current-date').innerText = `날짜: ${stockData[currentIndex].date}`;
        document.getElementById('current-news').innerText = stockData[currentIndex].news;
        document.getElementById('feedback').innerText = "";
        document.getElementById('prediction-section').style.display = "block";
        document.getElementById('next-btn').style.display = "none";
    }

    // 4. 학생이 상승/하락 버튼을 눌렀을 때
    function makePrediction(prediction) {
        if (currentIndex >= stockData.length - 1) {
            alert("준비된 데이터의 마지막 날입니다.");
            return;
        }
        userPrediction = prediction;
        document.getElementById('prediction-section').style.display = "none";
        document.getElementById('next-btn').style.display = "block";
        document.getElementById('feedback').innerText = `👉 당신의 예측: [ ${prediction} ] - 결과를 확인해 보세요!`;
    }

    // 5. '다음 날 결과 확인하기' 버튼을 눌렀을 때
    function nextDay() {
        currentIndex++;
        const nextData = stockData[currentIndex];
        const prevPrice = stockData[currentIndex - 1].price;
        
        // 차트에 새 데이터 추가
        chart.data.labels.push(nextData.date);
        chart.data.datasets[0].data.push(nextData.price);
        chart.update();

        // 실제 결과 계산
        const actualResult = nextData.price > prevPrice ? '상승' : '하락';
        let feedbackMsg = `실제 결과: ${actualResult}했습니다. `;
        
        if (userPrediction === actualResult) {
            feedbackMsg += "🎉 예측 성공! 호재/악재가 시장에 그대로 반영되었군요.";
        } else {
            feedbackMsg += "😅 예측 실패! 시장은 당신의 생각이나 뉴스의 액면가와 다르게 움직일 때가 많습니다.";
        }

        document.getElementById('feedback').innerText = feedbackMsg;
        
        // UI 재설정 타이머 (조금 기다렸다가 다음 뉴스 세팅)
        setTimeout(() => {
            if (currentIndex < stockData.length - 1) {
                updateUI();
            } else {
                document.getElementById('next-btn').style.display = "none";
                document.getElementById('feedback').innerText += "\n\n🏁 시뮬레이션이 종료되었습니다.";
            }
        }, 3000); // 3초 후 다음 문제로
    }

    // 페이지 로드 시 차트 그리기
    window.onload = initChart;
</script>

</body>
</html>
