<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채권 가격의 비밀: 금리 시소 게임</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --bond: #8e44ad; --bank: #2980b9; --profit: #e74c3c; --loss: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 700px; width: 100%; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; }
        
        .box { background: #fdfefe; border: 2px solid #bdc3c7; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .my-bond { border-color: var(--bond); background: #f5eef8; }
        
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 1.1em; color: #333; }
        input[type="range"] { width: 100%; cursor: pointer; margin-top: 10px; }
        .slider-value { text-align: center; font-size: 1.5em; font-weight: bold; color: var(--bank); margin-top: 10px; }
        
        .chart-container { position: relative; height: 220px; width: 100%; margin-top: 20px; }
        
        /* 🔥 새롭게 추가된 고정 금액 표시 영역 스타일 */
        .value-compare { display: flex; justify-content: space-between; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-top: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .value-item { text-align: center; width: 48%; }
        .value-item span { display: block; font-size: 1.4em; font-weight: bold; margin-top: 8px; }

        #resultMsg { padding: 20px; border-radius: 10px; margin-top: 15px; line-height: 1.6; font-size: 1.05em; }
        .profit-bg { background-color: #fadbd8; border: 2px solid var(--profit); color: #c0392b; }
        .loss-bg { background-color: #d6eaf8; border: 2px solid var(--loss); color: #21618c; }
        .neutral-bg { background-color: #f2f3f4; border: 2px solid #bdc3c7; color: #333; }
        
        .price-display { font-size: 1.4em; font-weight: bold; margin-top: 10px; background: white; padding: 10px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚖️ 채권 가격의 비밀 시뮬레이터</h2>
    <p class="subtitle">"사람들은 왜 내 채권에 웃돈을 주거나 깎으려 할까?"</p>
    
    <div class="box my-bond">
        <label style="color: var(--bond);">📜 내가 가진 채권 (투자 원금: 1,000만 원)</label>
        <p style="margin:0; font-size: 1.05em;">조건: "1년 뒤에 원금+이자 포함 무조건 <strong>1,050만 원(연 5%)</strong>을 줍니다."</p>
    </div>

    <div class="box">
        <label style="color: var(--bank);">🏦 변해버린 '현재 은행 예금 금리' 조절하기</label>
        <p style="margin:0; font-size: 0.9em; color: #666;">지금 1,000만 원을 은행에 넣으면 1년 뒤에 얼마를 줄까요?</p>
        <input type="range" id="marketRate" min="1" max="10" step="0.5" value="5">
        <div class="slider-value">현재 은행 금리: <span id="rateDisplay">5.0</span>%</div>
    </div>

    <div class="chart-container">
        <canvas id="compareChart"></canvas>
    </div>

    <div class="value-compare">
        <div class="value-item" style="color: var(--bond);">
            내 채권이 1년 뒤 주는 돈
            <span>1,050만 원</span>
        </div>
        <div class="value-item" style="color: var(--bank);">
            새 은행 예금이 1년 뒤 주는 돈
            <span id="bankValueText">1,050만 원</span>
        </div>
    </div>

    <div id="resultMsg" class="neutral-bg">
        결과가 이곳에 표시됩니다.
    </div>
</div>

<script>
    let compareChart = null;

    // 고정된 채권 데이터
    const principal = 1000;
    const bondFutureValue = 1050; 

    function formatMoney(amount) {
        return Math.floor(amount).toLocaleString() + "만 원";
    }

    function updateSim() {
        const marketRate = parseFloat(document.getElementById('marketRate').value);
        document.getElementById('rateDisplay').innerText = marketRate.toFixed(1);

        // 1. 새로운 은행 예금의 1년 뒤 금액 계산
        const bankFutureValue = principal * (1 + (marketRate / 100));

        // 🔥 1-1. 고정 금액 표시판 업데이트
        document.getElementById('bankValueText').innerText = formatMoney(bankFutureValue);

        // 2. 현재 채권의 중고 마켓 적정 가격 계산
        const currentBondPrice = bondFutureValue / (1 + (marketRate / 100));

        // 3. 설명 메시지 업데이트
        const msgBox = document.getElementById('resultMsg');
        let explanation = "";
        let priceHtml = `<div class="price-display">내 채권의 중고마켓 거래가: <span style="color: #e74c3c;">${currentBondPrice.toFixed(1)}만 원</span></div>`;

        if (marketRate < 5.0) {
            msgBox.className = 'profit-bg';
            explanation = `<strong>🔥 은행 금리가 떨어졌네요!</strong><br>
            지금 은행에 1,000만 원을 넣으면 1년 뒤에 ${formatMoney(bankFutureValue)}밖에 못 받습니다.<br>
            하지만 내 채권은 무조건 1,050만 원을 주죠! 사람들이 내 채권을 탐내기 시작합니다.<br>
            그래서 원금(1,000만 원)보다 더 비싼 <strong>'웃돈(프리미엄)'</strong>을 받고 팔 수 있습니다.`;
        } else if (marketRate > 5.0) {
            msgBox.className = 'loss-bg';
            explanation = `<strong>🧊 은행 금리가 올랐네요!</strong><br>
            지금 은행에 1,000만 원을 넣으면 1년 뒤에 무려 ${formatMoney(bankFutureValue)}이나 줍니다.<br>
            아무도 1,050만 원밖에 안 주는 내 채권을 원금(1,000만 원) 주고 사려 하지 않습니다.<br>
            그래서 내 채권은 원금보다 싼 <strong>'헐값(할인)'</strong>에 내놓아야 겨우 팔립니다.`;
        } else {
            msgBox.className = 'neutral-bg';
            explanation = `<strong>⚖️ 은행 금리와 내 채권 금리가 같습니다.</strong><br>
            은행 예금이나 내 채권이나 1년 뒤에 받는 돈이 똑같이 1,050만 원입니다.<br>
            그래서 내 채권은 웃돈이나 할인 없이 산 가격 그대로 거래됩니다.`;
            priceHtml = `<div class="price-display">내 채권의 중고마켓 거래가: <span>${currentBondPrice.toFixed(1)}만 원</span></div>`;
        }

        msgBox.innerHTML = explanation + priceHtml;

        // 4. 차트 업데이트
        drawChart(bankFutureValue);
    }

    function drawChart(bankFutureValue) {
        const ctx = document.getElementById('compareChart').getContext('2d');
        if (compareChart) compareChart.destroy();

        compareChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['내 채권이 1년 뒤 주는 돈', '새로운 예금이 주는 돈'],
                datasets: [{
                    data: [bondFutureValue, bankFutureValue],
                    backgroundColor: ['#8e44ad', '#2980b9'],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    tooltip: { enabled: false } // 고정 텍스트가 있으므로 툴팁은 숨김
                },
                scales: { 
                    y: { 
                        min: 950, 
                        max: 1150,
                        ticks: { callback: v => v + '만' } 
                    } 
                }
            }
        });
    }

    // 이벤트 리스너 등록
    document.getElementById('marketRate').addEventListener('input', updateSim);
    window.onload = updateSim;
</script>

</body>
</html>
